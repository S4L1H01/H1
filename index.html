<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H1 - Hamam Yarışı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="race-sound" src="h1ses.mp3" preload="auto"></audio>

    <div id="main-menu" class="screen active">
        <h1 class="logo">H1</h1>
        <div class="menu-btns">
            <button class="glow-btn" onclick="startSinglePlayer()">YARIŞA BAŞLA</button>
            <div class="balance-main">BAKİYE: <span id="main-balance">10000</span> YDL</div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="header">
            <div class="balance">BAKİYE: <span id="my-balance-display">10000</span> YDL</div>
        </div>
        <h2 class="sub-title">ARACINI SEÇ</h2>
        <div id="bug-grid" class="selection-grid"></div>
        <div class="bet-section">
            <input type="number" id="bet-amount" value="500" min="100">
            <button id="ready-btn" class="glow-btn" onclick="launchRace()">GAZA BAS!</button>
        </div>
    </div>

    <div id="race-screen" class="screen">
        <div class="track-wrapper">
            <div class="track" id="race-track">
                <div class="lane"></div><div class="lane"></div><div class="lane"></div>
                <div class="lane"></div><div class="lane"></div><div class="lane"></div>
            </div>
        </div>
    </div>

    <div id="winner-screen" class="screen">
        <h1 id="win-status">ŞAMPİYONSUN</h1>
        <div class="winner-card">
            <img id="win-img" src="">
            <h2 id="win-name"></h2>
        </div>
        <p id="profit-info"></p>
        <button class="glow-btn" onclick="location.reload()">TEKRAR DENE</button>
    </div>

    <div id="fakir-overlay" class="hidden">
        <video id="fakir-video" preload="auto">
            <source src="fakir.mp4" type="video/mp4">
            Videonuz mp4 formatını desteklemiyor.
        </video>
    </div>

    <script src="script.js"></script>
</body>
</html>
